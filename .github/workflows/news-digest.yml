name: Refresh News Digest

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate digest
        run: npm run generate:news

      - name: Commit updated digest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: refresh news digest'
